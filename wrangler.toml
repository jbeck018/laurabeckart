#:schema node_modules/wrangler/config-schema.json

name = "laurabeckart"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
COMPANY_NAME = "Laura Beck Art"
SITE_NAME = "Laura Beck Art"
NEXT_PUBLIC_SERVER_URL = "https://laurabeckart.com"
PAYLOAD_PUBLIC_SERVER_URL = "https://laurabeckart.com"

[[d1_databases]]
binding = "laurabeckart_db"
database_name = "laurabeckart-db"
database_id = "2b90886f-d96c-4327-b254-f9009b4582fd"
